apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend-web
  name: frontend-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  strategy: {}
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - image: localhost/lumicloudllc-com_frontend-web:latest
        name: frontend-web
        ports:
        - containerPort: 80
        resources: {}
      imagePullSecrets: []
status: {}
