apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lumicloudllc-com
resources:
- ./../base/
- ./ingress.yaml
- ./issuer.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: ${REGISTRY_URL}/lumicloudllc-com_frontend-web
  target:
    kind: Deployment
    name: frontend-web
